<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mesh-Agent Panel{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.1">
    <!-- Font Awesome or similar (we'll draw SVG inline to be dependency-free and clean) -->
</head>
<body data-active-tab="{{ active_tab }}">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <span class="logo-text">Mesh-Agent</span>
        </div>
        
        <nav>
            <ul class="nav-links">
                <li class="nav-item {% if active_tab == 'chat' %}active{% endif %}">
                    <a href="/chat">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>AI Agent Chat</span>
                    </a>
                </li>
                <li class="nav-item {% if active_tab == 'terminal' %}active{% endif %}">
                    <a href="/terminal">
                        <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                        <span>Terminal Logs</span>
                    </a>
                </li>
                <li class="nav-item {% if active_tab == 'workspace' %}active{% endif %}">
                    <a href="/workspace">
                        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        <span>Workspace FS</span>
                    </a>
                </li>
                <li class="nav-item {% if active_tab == 'config' %}active{% endif %}">
                    <a href="/config">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>Configuration</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>
    
    <!-- Main Panel Container -->
    <div class="main-container">
        
        <!-- Header -->
        <header class="header">
            <h1 class="page-title">
                {% block page_title %}Mesh-Agent Panel{% endblock %}
            </h1>
            <div class="header-status">
                <span class="status-indicator"></span>
                <span>Sandbox Active</span>
            </div>
        </header>
        
        <!-- Tab Content -->
        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/app.js?v=1.1"></script>
</body>
</html>
